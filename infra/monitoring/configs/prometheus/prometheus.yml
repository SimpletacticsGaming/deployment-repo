global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration (placeholder for future use)
alerting:
  alertmanagers: []

# Rule files (placeholder for future use)
rule_files: []

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
          stack: "monitoring"

  # Grafana metrics
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: "grafana"
          stack: "monitoring"

  # Loki metrics
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"
          stack: "monitoring"

  # Alloy metrics
  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]
        labels:
          service: "alloy"
          stack: "monitoring"

# Remote write endpoint for Alloy
remote_write: []
