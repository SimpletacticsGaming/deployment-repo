name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'stacks/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dev: ${{ steps.changes.outputs.dev }}
      prod: ${{ steps.changes.outputs.prod }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed environments
        id: changes
        run: |
          # Check if dev-related files changed
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(infra/(modules|environments/dev)|stacks/.*/overrides/dev\.yaml|stacks/.*/service\.yaml)'; then
            echo "dev=true" >> $GITHUB_OUTPUT
          else
            echo "dev=false" >> $GITHUB_OUTPUT
          fi

          # Check if prod-related files changed
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(infra/(modules|environments/prod)|stacks/.*/overrides/prod\.yaml|stacks/.*/service\.yaml)'; then
            echo "prod=true" >> $GITHUB_OUTPUT
          else
            echo "prod=false" >> $GITHUB_OUTPUT
          fi

  apply-dev:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dev == 'true'
    environment: dev
    env:
      TF_VAR_docker_host: ${{ secrets.DOCKER_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init (Dev)
        working-directory: infra/environments/dev
        env:
          PG_CONN_STR: ${{ secrets.TF_BACKEND_CONN_STR }}
        run: terraform init

      - name: Terraform Apply (Dev)
        working-directory: infra/environments/dev
        env:
          PG_CONN_STR: ${{ secrets.TF_BACKEND_CONN_STR }}
        run: terraform apply -auto-approve

  apply-prod:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - apply-dev
    if: |
      always() &&
      needs.detect-changes.outputs.prod == 'true' &&
      (needs.apply-dev.result == 'success' || needs.apply-dev.result == 'skipped')
    environment: prod
    env:
      TF_VAR_docker_host: ${{ secrets.DOCKER_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init (Prod)
        working-directory: infra/environments/prod
        env:
          PG_CONN_STR: ${{ secrets.TF_BACKEND_CONN_STR }}
        run: terraform init

      - name: Terraform Apply (Prod)
        working-directory: infra/environments/prod
        env:
          PG_CONN_STR: ${{ secrets.TF_BACKEND_CONN_STR }}
        run: terraform apply -auto-approve
